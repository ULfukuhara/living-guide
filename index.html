  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyDneH08GavPizbtH4Oi-RsTrwGerxXWSyQ",
      authDomain: "univlife-kanri.firebaseapp.com",
      projectId: "univlife-kanri",
      storageBucket: "univlife-kanri.firebasestorage.app",
      messagingSenderId: "405011982427",
      appId: "1:405011982427:web:cf56a37550ab714bfdb77e",
      measurementId: "G-DXMR0VL972"
    };

    const SECTION_KEYS = [
      "key",
      "mailbox",
      "delivery_box",
      "bicycle_space",
      "room_equipment",
      "special_note",
      "moving",
      "electricity",
      "gas",
      "water",
      "internet",
      "trash",
      "common_area",
      "pets",
      "toilet",
      "noise",
      "drainage",
      "ventilation",
      "heater",
      "air_conditioner",
      "bike_parking",
      "car_parking",
      "sales",
      "expenses",
      "cancellation",
      "management_other",
      "usac",
      "kurasapo_connect"
    ];

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getFirestore, doc, getDoc, collection, getDocs, query, where, limit
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    let db = null;
    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    } catch (e) {
      console.error("Firestore 初期化に失敗:", e);
      db = null;
    }

    function escapeHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeBool(v) {
      if (v === true) return true;
      if (v === false) return false;
      if (v === 1) return true;
      if (v === 0) return false;
      if (typeof v === "string") {
        const s = v.trim().toLowerCase();
        if (["true", "1", "yes", "on"].includes(s)) return true;
        if (["false", "0", "no", "off"].includes(s)) return false;
      }
      return false;
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function pickFirst(obj, keys) {
      for (const k of keys) {
        const v = obj?.[k];
        if (v !== undefined && v !== null && String(v).trim() !== "") return v;
      }
      return "";
    }

    async function loadSectionsMaster() {
      const colRef = collection(db, "sections_master");
      const snap = await getDocs(colRef);
      const map = {};
      snap.forEach((d) => { map[d.id] = d.data(); });
      return map;
    }

    async function loadPropertyShiori(propertyNo) {
      const ref = doc(db, "properties_shiori", propertyNo);
      const snap = await getDoc(ref);
      if (!snap.exists()) return null;
      return snap.data();
    }

   async function loadGuidesMasterRaw() {
    const list = [];

    // =========================
    // 1. guides_master 新形式
    // 例：
    // guides_master / usac
    //   section_key: "usac"
    //   bodies:
    //     base: "本文"
    // =========================
    try {
      const colRef = collection(db, "guides_master");
      const snap = await getDocs(colRef);

      snap.forEach((d) => {
        const data = d.data() || {};
        const sectionKey = String(data.section_key || d.id || "").trim();
        const bodies = data.bodies || {};

        if (!sectionKey) return;

        if (bodies && typeof bodies === "object") {
          Object.keys(bodies).forEach((variantKey) => {
            const bodyText = bodies[variantKey];

            if (bodyText && String(bodyText).trim() !== "") {
              list.push({
                section_key: sectionKey,
                variant_key: String(variantKey || "base").trim(),
                body_text: String(bodyText),
                image_urls: Array.isArray(data.image_urls) ? data.image_urls : []
              });
            }
          });
        }

        // 念のため guides_master 内に body_text がある形式にも対応
        if (data.body_text && String(data.body_text).trim() !== "") {
          list.push({
            section_key: sectionKey,
            variant_key: String(data.variant_key || "base").trim(),
            body_text: String(data.body_text),
            image_urls: Array.isArray(data.image_urls) ? data.image_urls : []
          });
        }
      });
    } catch (e) {
      console.error("guides_master 読み込み失敗:", e);
    }

    // =========================
    // 2. guides_master_raw 旧形式
    // 例：
    // guides_master_raw / 任意ID
    //   section_key: "kurasapo_connect"
    //   variant_key: "base"
    //   body_text: "本文"
    // =========================
    try {
      const rawColRef = collection(db, "guides_master_raw");
      const rawSnap = await getDocs(rawColRef);

      rawSnap.forEach((d) => {
        const data = d.data() || {};

        const sectionKey = String(data.section_key || "").trim();
        const variantKey = String(data.variant_key || "base").trim();
        const bodyText = String(data.body_text || "");

        if (!sectionKey) return;
        if (bodyText.trim() === "") return;

        list.push({
          section_key: sectionKey,
          variant_key: variantKey,
          body_text: bodyText,
          image_urls: Array.isArray(data.image_urls) ? data.image_urls : []
        });
      });
    } catch (e) {
      console.error("guides_master_raw 読み込み失敗:", e);
    }

    console.log("本文マスター読み込み件数:", list.length, list);

    return list;
  }

    async function loadRoomSecretByToken(token) {
      if (!token) return null;
      const colRef = collection(db, "postdials");
      const q = query(colRef, where("token", "==", token), limit(1));
      const snap = await getDocs(q);
      if (snap.empty) return null;
      const docSnap = snap.docs[0];
      return { id: docSnap.id, ...docSnap.data() };
    }

    function renderRoomSecretSection(roomData) {
      const section = document.getElementById("roomSecretSection");
      if (!section) return;

      const propertyName = roomData.propertyName || "";
      const roomNo = roomData.roomNo || "";

      window.__roomNo = roomNo ? String(roomNo).trim() : "";

      const titleParts = [];
      if (propertyName) titleParts.push(propertyName);
      if (roomNo) titleParts.push(roomNo + "号室");
      document.getElementById("roomSecretTitle").textContent = titleParts.join(" ") || "このお部屋";

      let hasAny = false;

      const mailbox = roomData.mailboxCode;
      if (mailbox && String(mailbox).trim() !== "") {
        document.getElementById("roomMailboxSection").classList.remove("hidden");
        document.getElementById("roomMailboxValue").textContent = String(mailbox);
        hasAny = true;
      }

      const delivery = roomData.deliveryBoxCode;
      if (delivery && String(delivery).trim() !== "") {
        document.getElementById("roomDeliverySection").classList.remove("hidden");
        document.getElementById("roomDeliveryValue").textContent = String(delivery);
        hasAny = true;
      }

      const bicycle = roomData.bicycleSpace;
      if (bicycle && String(bicycle).trim() !== "") {
        document.getElementById("roomBicycleSection").classList.remove("hidden");
        document.getElementById("roomBicycleValue").textContent = String(bicycle);
        hasAny = true;
      }

      const wifiSsid = pickFirst(roomData, ["Wi-Fi_SSID","Wi-Fi SSID","WiFi_SSID","wifi_ssid","wifiSsid","ssid","SSID"]);
      const wifiPass = pickFirst(roomData, ["Wi-Fi_PASS","Wi-Fi PASS","WiFi_PASS","wifi_pass","wifiPass","password","PASS","Password","パスワード"]);

      if (wifiSsid || wifiPass) {
        document.getElementById("roomWifiSection").classList.remove("hidden");
        if (wifiSsid) document.getElementById("roomWifiSsid").textContent = "SSID: " + String(wifiSsid);
        if (wifiPass) document.getElementById("roomWifiPass").textContent = "パスワード: " + String(wifiPass);
        hasAny = true;
      }

      if (hasAny) {
        section.classList.remove("hidden");
        const btn = document.getElementById("roomSecretToggleBtn");
        const body = document.getElementById("roomSecretBody");
        if (btn && body) {
          btn.addEventListener("click", () => {
            const hidden = body.classList.contains("hidden");
            if (hidden) {
              body.classList.remove("hidden");
              btn.textContent = "この部屋の情報を隠す";
            } else {
              body.classList.add("hidden");
              btn.textContent = "この部屋の情報を表示";
            }
          });
        }
      }
    }

    function pickContent(masterList, sectionKey, variantKey) {
      if (!masterList || masterList.length === 0) return null;
      const vKey = variantKey || "base";
      let hit = masterList.find(r => r.section_key === sectionKey && r.variant_key === vKey);
      if (!hit) hit = masterList.find(r => r.section_key === sectionKey && r.variant_key === "base");
      if (!hit) return null;

      return {
        body: hit.body_text || "",
        images: Array.isArray(hit.image_urls) ? hit.image_urls : []
      };
    }

    function renderPlainTextAsHtml(text) {
      if (!text) return "";
      let escaped = escapeHtml(text);

      escaped = escaped.replace(
        /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
        (m, label, url) =>
          `<a href="${url}" target="_blank" rel="noopener" class="text-sky-600 underline">${label}</a>`
      );

      return escaped.replace(/\r?\n/g, "<br />");
    }

    function buildSectionConfig(propData) {
      if (!propData) return null;
      const config = {};
      SECTION_KEYS.forEach((key) => {
        const raw = propData[key];
        if (raw === undefined || raw === null || raw === "") {
          config[key] = { enabled: false, variant: null };
          return;
        }
        if (typeof raw === "boolean") {
          config[key] = { enabled: raw, variant: null };
          return;
        }
        if (typeof raw === "number") {
          config[key] = { enabled: raw !== 0, variant: null };
          return;
        }
        const s = String(raw).trim();
        const lower = s.toLowerCase();
        if (["false","0","no","off"].includes(lower)) {
          config[key] = { enabled: false, variant: null };
          return;
        }
        if (["true","1","yes","on","base"].includes(lower)) {
          config[key] = { enabled: true, variant: null };
          return;
        }
        config[key] = { enabled: true, variant: s };
      });
      return config;
    }

    function mergeSections(masterMap, sectionConfig, masterList, defaultVariantKey) {
      const sections = [];

      Object.keys(masterMap).forEach((key) => {
        const master = masterMap[key] || {};
        if (!sectionConfig || !Object.prototype.hasOwnProperty.call(sectionConfig, key)) return;

        const cfg = sectionConfig[key];
        if (!cfg?.enabled) return;

        const vKey = cfg.variant || defaultVariantKey || "base";
        const content = pickContent(masterList, key, vKey);
        if (!content || !content.body) return;

        sections.push({
          key,
          label: master.label_ja || key,
          summary: master.summary || "",
          group: master.group || "その他",
          order: typeof master.order === "number" ? master.order : 9999,
          icon: master.icon || "",
          body: content.body,
          images: content.images || []
        });
      });

      sections.sort((a, b) => a.order - b.order);
      return sections;
    }

    function buildSurveyUrl({ token = "", propertyNo = "", source = "unknown" } = {}) {
      const base = "https://guide.univ-life.com/survey.html";
      const u = new URL(base);
      if (token) u.searchParams.set("token", token);
      if (!token && propertyNo) u.searchParams.set("propertyNo", propertyNo);
      u.searchParams.set("source", source);
      return u.toString();
    }

    function renderGroupedTabsWithAccordion(sections) {
      const tabNav = document.getElementById("tabNav");
      const tabPanels = document.getElementById("tabPanels");
      tabNav.innerHTML = "";
      tabPanels.innerHTML = "";

      if (!sections.length) {
        tabPanels.innerHTML =
          '<p class="text-sm text-slate-500">この物件で公開されている入居のしおりはまだ登録されていません。</p>';
        return;
      }

      const groupMap = new Map();
      sections.forEach((sec) => {
        const gname = sec.group || "その他";
        if (!groupMap.has(gname)) {
          groupMap.set(gname, { name: gname, order: sec.order || 9999, icon: sec.icon || "", sections: [] });
        }
        const g = groupMap.get(gname);
        g.order = Math.min(g.order, sec.order || 9999);
        if (!g.icon && sec.icon) g.icon = sec.icon;
        g.sections.push(sec);
      });

      const groups = Array.from(groupMap.values()).sort((a, b) => {
        if (a.order !== b.order) return a.order - b.order;
        return a.name.localeCompare(b.name, "ja");
      });
      groups.forEach((g) => g.sections.sort((a, b) => a.order - b.order));

      groups.forEach((group, gIndex) => {
        const active = gIndex === 0;

        const tabBtn = document.createElement("button");
        tabBtn.type = "button";
        tabBtn.dataset.tabGroup = group.name;
        tabBtn.className =
          "group-tab inline-flex items-center justify-center px-3 py-1.5 " +
          "rounded-full whitespace-normal break-words text-[11px] leading-snug " +
          "text-center max-w-[48%] border shadow-sm " +
          (active
            ? "bg-slate-900 text-white border-slate-900"
            : "bg-slate-100 text-slate-700 border-slate-200");
        tabBtn.innerHTML = `<span>${escapeHtml(group.name)}</span>`;
        tabNav.appendChild(tabBtn);

        const panel = document.createElement("section");
        panel.dataset.tabGroupPanel = group.name;
        panel.className = (active ? "" : "hidden ") + "bg-transparent space-y-3";

        group.sections.forEach((sec) => {
          const bodyId = `g${gIndex}-sec-${sec.key}`;
          const expanded = false;

          const card = document.createElement("div");
          card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden";

          const surveyUrl = (sec.key === "management_other")
            ? (window.__token
                ? buildSurveyUrl({ token: window.__token, source: "shiori_room" })
                : buildSurveyUrl({ propertyNo: window.__propertyNo || "", source: "shiori_public" })
              )
            : "";

          const groupId = `${gIndex}-${sec.key}`; // ✅ lightbox group key

          card.innerHTML = `
            <button
              type="button"
              class="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 focus:outline-none"
              data-accordion-toggle="${bodyId}"
            >
              <div class="flex items-center gap-3 text-left">
                <div class="flex-shrink-0">
                  <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-slate-100 text-slate-700">
                    <i data-lucide="${sec.icon || "file-text"}" class="w-4 h-4"></i>
                  </span>
                </div>
                <div>
                  <div class="text-sm font-semibold text-slate-900">
                    ${escapeHtml(sec.label)}
                  </div>
                  ${
                    sec.summary
                      ? `<div class="text-[11px] text-slate-500 mt-0.5">${escapeHtml(sec.summary)}</div>`
                      : ""
                  }
                </div>
              </div>
              <div class="ml-3 flex-shrink-0">
                <svg class="w-4 h-4 text-slate-400 transition-transform duration-150 ${expanded ? "rotate-180" : ""}"
                  data-chevron-for="${bodyId}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </div>
            </button>

            <div id="${bodyId}"
              class="px-4 pb-4 pt-1 text-xs text-slate-700 leading-relaxed ${expanded ? "" : "hidden"}"
            >
              <div class="border-t border-slate-100 pt-2 richtext">
                ${renderPlainTextAsHtml(sec.body)}

                ${
                  sec.images && sec.images.length
                    ? `
                      <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-3">
                        ${sec.images.map((url, i) => `
                          <img
                            src="${escapeHtml(url)}"
                            alt=""
                            loading="lazy"
                            data-lightbox-group="${groupId}"
                            data-lightbox-index="${i}"
                            class="rounded-lg border border-slate-200 shadow-sm w-full object-cover cursor-zoom-in"
                          />
                        `).join("")}
                      </div>
                    `
                    : ""
                }

                ${
                  sec.key === "management_other" && surveyUrl
                    ? `
                      <div class="mt-4">
                        <a href="${surveyUrl}"
                           target="_blank" rel="noopener"
                           class="inline-flex items-center gap-2 rounded-lg border border-slate-200 px-3 py-2 text-sm text-blue-700 hover:bg-slate-50">
                          📝 入居直後アンケート（1分）
                        </a>
                        <div class="text-[11px] text-slate-400 mt-1">任意／今後の改善に活用します</div>
                      </div>
                    `
                    : ""
                }
              </div>
            </div>
          `;

          panel.appendChild(card);
        });

        tabPanels.appendChild(panel);
      });

      // タブ切替
      document.querySelectorAll(".group-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          const target = tab.dataset.tabGroup;

          document.querySelectorAll(".group-tab").forEach((t) => {
            const active = t === tab;
            t.classList.toggle("bg-slate-900", active);
            t.classList.toggle("text-white", active);
            t.classList.toggle("border-slate-900", active);
            t.classList.toggle("bg-slate-100", !active);
            t.classList.toggle("text-slate-700", !active);
            t.classList.toggle("border-slate-200", !active);
          });

          document.querySelectorAll("[data-tab-group-panel]").forEach((p) => {
            p.classList.toggle("hidden", p.dataset.tabGroupPanel !== target);
          });
        });
      });

      // アコーディオン
      document.querySelectorAll("[data-accordion-toggle]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const bodyId = btn.getAttribute("data-accordion-toggle");
          const bodyEl = document.getElementById(bodyId);
          const chevron = btn.querySelector('[data-chevron-for="' + bodyId + '"]');
          if (!bodyEl) return;
          const isHidden = bodyEl.classList.contains("hidden");
          if (isHidden) {
            bodyEl.classList.remove("hidden");
            if (chevron) chevron.classList.add("rotate-180");
          } else {
            bodyEl.classList.add("hidden");
            if (chevron) chevron.classList.remove("rotate-180");
          }
        });
      });

      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
    }

    async function main() {
      const tabPanels = document.getElementById("tabPanels");

      if (!db) {
        showError("データを読み込めませんでした。時間をおいて再度お試しください。");
        return;
      }

      const url = new URL(window.location.href);
      let propertyNo = url.searchParams.get("propertyNo") || "";
      const token = url.searchParams.get("token") || "";

      window.__token = token || "";

      // ✅ TOP（/）は説明ページ
      if (!propertyNo && !token) {
        document.title = "入居のしおり｜ユニヴ・ライフ株式会社";
        document.getElementById("propertyTitle").textContent = "入居のしおり（Web）";
        document.getElementById("propertyMetaSection")?.classList.add("hidden");
        document.getElementById("tabNav").innerHTML = "";

        tabPanels.innerHTML = `
          <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-6">
            <h1 class="text-xl font-bold text-slate-900">
              入居のしおり（Web）｜ユニヴ・ライフ株式会社
            </h1>

            <div class="text-sm text-slate-700 leading-relaxed space-y-3">
              <p>
                本ページは、ユニヴ・ライフ株式会社が管理する賃貸物件の
                入居者様向けWeb入居のしおりです。
              </p>
              <p>
                入居時にお渡ししている「入居のしおり」をWeb版として公開しています。
              </p>
              <ul class="list-disc pl-5 space-y-1">
                <li>ゴミ出し方法・分別ルール</li>
                <li>インターネット利用方法</li>
                <li>設備の使用方法</li>
                <li>生活マナー・注意事項</li>
                <li>契約・費用に関するご案内</li>
              </ul>

              <p class="text-slate-500 text-xs">
                ※ 物件別ページは、鍵渡し書類のQRコードまたはURLよりアクセスしてください。
              </p>
            </div>

            <div class="pt-4 border-t border-slate-100">
              <a href="/list.html" class="text-xs text-slate-400 underline hover:text-slate-600">
                ユニヴ・ライフ 管理物件 入居のしおり一覧
              </a>
            </div>
          </section>
        `;
        return;
      }

      // token → postdials → propertyNo決定 ＋ 部屋カード
      if (token) {
        try {
          const roomData = await loadRoomSecretByToken(token);
          if (!roomData) {
            showError("token=" + token + " で postdials を検索しましたが、該当データが見つかりませんでした。");
            tabPanels.innerHTML = "";
            return;
          }
          renderRoomSecretSection(roomData);

          const bukkenNo = roomData.propertyNo;
          if (!bukkenNo || String(bukkenNo).trim() === "") {
            showError("postdials のドキュメントに『物件No』フィールドがありません。");
            tabPanels.innerHTML = "";
            return;
          }
          propertyNo = String(bukkenNo).trim();
        } catch (e) {
          console.error("部屋情報の読み込みエラー:", e);
          showError("お部屋専用情報（postdials）の読み込み中にエラーが発生しました。");
          tabPanels.innerHTML = "";
          return;
        }
      }

      if (!propertyNo) {
        showError("URL に ?propertyNo=XXXX または ?token=XXXX を指定してください。");
        tabPanels.innerHTML = "";
        return;
      }

      window.__propertyNo = propertyNo;

      try {
        const results = await Promise.allSettled([
          loadSectionsMaster(),
          loadPropertyShiori(propertyNo),
          loadGuidesMasterRaw()
        ]);

        if (results.some(r => r.status === "rejected")) {
          console.error("読み込みエラー:", results);
          showError("データの読み込みに失敗しました。");
          return;
        }

        const masterMap = results[0].value || {};
        const propertyData = results[1].value || null;
        const masterList = results[2].value || [];

        if (!propertyData) {
          showError("この物件の入居のしおり設定が登録されていません。");
          tabPanels.innerHTML = "";
          return;
        }

        const title =
          propertyData.canonicalName ||
          propertyData.propertyName ||
          "物件No. " + propertyNo;

        document.getElementById("propertyTitle").textContent = title;
        document.title = `${title}｜入居のしおり｜ユニヴ・ライフ株式会社`;

        // 部屋カードの物件名を canonicalName に統一
        const roomTitleEl = document.getElementById("roomSecretTitle");
        const roomSectionEl = document.getElementById("roomSecretSection");
        if (roomTitleEl && roomSectionEl && !roomSectionEl.classList.contains("hidden")) {
          const rn = (window.__roomNo || "").replace(/号室$/, "").trim();
          roomTitleEl.textContent = rn ? `${title} ${rn}号室` : title;
        }

        const zip = pickFirst(propertyData, ["zip_code", "postal_code", "郵便番号"]);
        const address = pickFirst(propertyData, ["address", "住所"]);

        // ✅ SEO（共通ページだけ index）
        (function applySeo() {
          const url = new URL(window.location.href);
          const tokenParam = url.searchParams.get("token") || "";

          // tokenページは noindex
          if (tokenParam) {
            let robots = document.querySelector('meta[name="robots"]');
            if (!robots) {
              robots = document.createElement("meta");
              robots.name = "robots";
              document.head.appendChild(robots);
            }
            robots.content = "noindex,nofollow";
            return;
          }

          // propertyNoページ canonical
          if (propertyNo) {
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) {
              canonical = document.createElement("link");
              canonical.rel = "canonical";
              document.head.appendChild(canonical);
            }
            canonical.href = `https://guide.univ-life.com/?propertyNo=${propertyNo}`;
          }

          // title / description 動的
          const safeTitle = title || ("物件No. " + propertyNo);
          document.title = `${safeTitle}｜入居のしおり｜ユニヴ・ライフ株式会社`;

          let metaDesc = document.querySelector('meta[name="description"]');
          if (!metaDesc) {
            metaDesc = document.createElement("meta");
            metaDesc.name = "description";
            document.head.appendChild(metaDesc);
          }

          const addrText = [zip ? `〒${zip}` : "", address || ""].filter(Boolean).join(" ");
          metaDesc.content =
            `${safeTitle}の入居のしおり（入居者向け案内）です。` +
            `ゴミ出し、インターネット、設備、注意事項などを掲載しています。` +
            (addrText ? `所在地：${addrText}` : "");

          const ld = {
            "@context": "https://schema.org",
            "@type": "WebPage",
            "name": `${safeTitle}｜入居のしおり`,
            "description": metaDesc.content,
            "url": `https://guide.univ-life.com/?propertyNo=${propertyNo}`,
            "publisher": { "@type": "Organization", "name": "ユニヴ・ライフ株式会社" }
          };

          const existing = document.getElementById("ldjson-shiori");
          if (existing) existing.remove();

          const script = document.createElement("script");
          script.type = "application/ld+json";
          script.id = "ldjson-shiori";
          script.textContent = JSON.stringify(ld);
          document.head.appendChild(script);
        })();

        // meta表示
        const metaEl = document.getElementById("propertyMeta");
        if (zip && address) metaEl.textContent = `〒${zip}　${address}`;
        else if (address) metaEl.textContent = address;
        else metaEl.textContent = "所在地情報は現在準備中です";

        // 物件の公開フラグ
        if (normalizeBool(propertyData.shiori_enabled) === false) {
          tabPanels.innerHTML = '<p class="text-sm text-slate-500">この物件の入居のしおりは準備中です。</p>';
          return;
        }

        const defaultVariantKey = propertyData.variant_key || "base";
        const sectionConfig = buildSectionConfig(propertyData);
        const mergedSections = mergeSections(masterMap, sectionConfig, masterList, defaultVariantKey);

        renderGroupedTabsWithAccordion(mergedSections);

      } catch (e) {
        console.error("main() 内でエラー:", e);
        showError("データの読み込み中にエラーが発生しました。");
      }
    }

    document.addEventListener("DOMContentLoaded", main);
  </script>

  <!-- ======================================================= -->
  <!-- Lightbox Script（必ず script タグ内） -->
  <!-- ======================================================= -->
  <script>
    let currentImages = [];
    let currentIndex = 0;
    let startX = 0;

    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxClose = document.getElementById("lightboxClose");
    const lightboxCounter = document.getElementById("lightboxCounter");

    function openLightbox(images, index) {
      currentImages = images || [];
      currentIndex = Math.max(0, Math.min(index || 0, currentImages.length - 1));

      lightbox.classList.remove("hidden");
      lightbox.classList.add("flex");
      updateImage();
    }

    function closeLightbox() {
      lightbox.classList.add("hidden");
      lightbox.classList.remove("flex");
    }

    function updateImage() {
      if (!currentImages.length) return;
      lightboxImage.src = currentImages[currentIndex];
      if (lightboxCounter) {
        lightboxCounter.textContent = `${currentIndex + 1} / ${currentImages.length}`;
      }
    }

    function nextImage() {
      if (!currentImages.length) return;
      currentIndex = (currentIndex + 1) % currentImages.length;
      updateImage();
    }

    function prevImage() {
      if (!currentImages.length) return;
      currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
      updateImage();
    }

    // ✅ 画像クリックで起動（動的DOMでもOK：イベント委譲）
    document.addEventListener("click", (e) => {
      const img = e.target.closest('img[data-lightbox-index][data-lightbox-group]');
      if (!img) return;

      const group = img.dataset.lightboxGroup;
      const imgs = Array.from(document.querySelectorAll(`img[data-lightbox-group="${group}"]`));
      const images = imgs.map(i => i.currentSrc || i.src);

      const idx = Number(img.dataset.lightboxIndex || 0);
      openLightbox(images, idx);
    });

    // 閉じる
    lightboxClose.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // スワイプ
    lightbox.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    lightbox.addEventListener("touchend", (e) => {
      const endX = e.changedTouches[0].clientX;
      const diff = endX - startX;
      if (Math.abs(diff) < 50) return;
      if (diff < 0) nextImage();
      else prevImage();
    });

    // キーボード（PC）
    document.addEventListener("keydown", (e) => {
      if (lightbox.classList.contains("hidden")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") nextImage();
      if (e.key === "ArrowLeft") prevImage();
    });
  </script>
